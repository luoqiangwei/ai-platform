version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ai-platform-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ai_platform
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro # 自动初始化脚本
    networks:
      - ai-network

  # 2. Your Go Platform (The Nervous System)
  app:
    image: ai-platform:latest
    container_name: ai-platform-app
    restart: always
    depends_on:
      - db
    env_file: .env
    environment:
      - DB_HOST=db
    ports:
      - "8080:8080"
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
